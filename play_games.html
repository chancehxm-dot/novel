    <script>
        QuickGame.initPlay();
        function getQueryString(name) {
            let reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
            let r = window.location.search.substr(1).match(reg);
            if (r != null) {
                return decodeURIComponent(r[2]);
            };
            return null;
        }
        loadLocalJSON('GET', './home.json', function (data) {
            const targetId = getQueryString('id');
            var gamsList = '';
            var dataArray = data.populargames.concat(data.hotgames, data.newgames)
            var gameData = dataArray;
            const game = document.getElementById("game");
            for (var i = 0; i < gameData.length; i++) {
                if (gameData[i].gid == targetId) {
                    gamsList = gameData[i];
                    break;
                }
            }
            if (!gamsList) {
                alert("THE GAEM IS OFFLINE!");
                location.href = "/";
            } else {
                const { name, title, dir_title } = gamsList;
                if (dir_title) {
                    var gameLinkName = dir_title;
                    game.data = '/games/' + targetId + '/games/' + gameLinkName + '/index.html';
                } else {
                    var fileName = title ? title : name;
                    const replacedString = fileName.toLocaleLowerCase().replace(/ /g, "-");
                    game.data = '/games/' + targetId + '/games/' + replacedString + '/index.html';
                }
            };
        })
    </script>
